# 必要な GitHub Secrets:
#   KEYSTORE_BASE64   : base64 エンコードした署名用キーストアファイル
#                       生成例: base64 -w0 release.jks
#   KEYSTORE_PASSWORD : キーストアのパスワード
#   KEY_ALIAS         : キーストア内のキーエイリアス
#   KEY_PASSWORD      : キーのパスワード

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          APKSIGNER=$(find "$ANDROID_SDK_ROOT/build-tools" -name "apksigner" | sort -V | tail -1)

          "$APKSIGNER" sign \
            --ks keystore.jks \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            --out "app/build/outputs/apk/release/RealSizeViewer-${{ github.ref_name }}.apk" \
            app/build/outputs/apk/release/app-release-unsigned.apk

          rm keystore.jks

      - uses: softprops/action-gh-release@v2
        with:
          generate_notes: true
          files: app/build/outputs/apk/release/RealSizeViewer-${{ github.ref_name }}.apk
